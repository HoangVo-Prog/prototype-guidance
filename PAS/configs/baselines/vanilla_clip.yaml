experiment:
  name: vanilla_clip_baseline
  output_dir: runs
  seed: 1
  local_rank: 0

model:
  name: PAS
  variant: vanilla_clip_baseline
  training_mode: vanilla_clip
  pretrain_choice: ViT-B/16
  image_backbone: clip_visual
  text_backbone: clip_text_transformer
  embedding_dim: 512
  projection_dim: 256
  projector_hidden_dim: 512
  projector_dropout: 0.0
  projector_type: mlp2
  normalize_projector_outputs: true
  use_custom_projector: false
  backbone_precision: fp32
  prototype_precision: fp32
  temperature: 0.07
  img_size: [384, 128]
  stride_size: 16
  text_length: 77
  vocab_size: 49408
  use_prototype_bank: false
  use_image_conditioned_pooling: false
  return_debug_outputs: false

prototype:
  num_prototypes: 0
  prototype_dim: 512
  prototype_init: normalized_random
  prototype_init_path: null
  routing_type: cosine
  routing_temperature: 0.07
  contextualization_enabled: false
  contextualization_type: self_attention
  contextualization_residual: false
  normalize_for_self_interaction: true
  normalize_for_routing: true
  dead_prototype_threshold: 0.005

loss:
  use_diversity_loss: false
  diversity_loss_weight: 0.0
  use_balancing_loss: false
  balance_loss_weight: 0.0
  use_loss_proxy_image: false
  use_loss_proxy_text: false
  use_loss_proxy_text_exact: false
  lambda_proxy_image: 0.0
  lambda_proxy_text: 0.0
  lambda_proxy_text_exact: 0.0
  use_loss_align: false
  lambda_align: 0.0
  use_loss_diag: false
  lambda_diag: 0.0
  use_loss_ret: true
  retrieval_mode: clip_bidirectional
  lambda_ret: 1.0
  use_loss_support: false
  lambda_support: 0.0
  support_min: 2.0

text_pooling:
  token_policy: eos_only
  scoring_type: cosine
  normalize_for_token_scoring: true
  token_temperature: 0.07
  special_token_ids:
    bos_token_id: 49406
    eos_token_id: 49407
    pad_token_id: 0
  error_on_empty_kept_tokens: true

training:
  batch_size: 192
  epochs: 10
  log_period: 20
  eval_frequency: 1
  save_interval: 1
  resume: false
  resume_ckpt_file: ''
  finetune: ''
  pretrain: ''
  img_aug: true
  txt_aug: false
  sampler: random
  num_instance: 2
  num_workers: 4
  training: true
  stage: joint
  freeze_image_backbone: false
  freeze_text_backbone: false
  freeze_prototype_side: true
  grad_clip: 1.0
  amp: false
  amp_dtype: fp16
  proxy_temperature: 0.07

optimizer:
  type: AdamW
  lr: 0.0001
  lr_prototype_bank: 0.0
  lr_projectors: 0.0
  lr_image_backbone: 1e-5
  lr_text_backbone: 1e-5
  weight_decay: 0.01
  weight_decay_prototype_bank: 0.0
  weight_decay_projectors: 0.0
  lr_class_proxies: 0.0
  weight_decay_class_proxies: 0.0
  weight_decay_image_backbone: 0.01
  weight_decay_text_backbone: 0.01
  momentum: 0.9
  alpha: 0.9
  beta: 0.999
  milestones: [40, 50]
  gamma: 0.1
  warmup_factor: 0.1
  warmup_epochs: 1
  warmup_method: linear
  scheduler: cosine
  target_lr: 0.0
  power: 0.9

dataset:
  dataset_name: RSTPReid
  root_dir: data
  val_dataset: test
  num_workers: 4

logging:
  use_wandb: true
  project: vanilla_clip_baseline
  entity: null
  run_name: null
  group: baseline_vanilla_clip
  mode: online
  tags: [baseline, vanilla_clip, clip]
  notes: Strict vanilla CLIP baseline with EOS-only text embedding and bidirectional retrieval loss.
  log_interval: 50
  log_code: false
  log_debug_metrics: true

evaluation:
  checkpoint_path: ''
  device: cuda
  cross_domain_generalization: false
  target_domain: RSTPReid
  retrieval_metrics: [R1, R5, R10, mAP, mINP, rSum]
  batch_size: 512
  prototype_image_chunk_size: 32
  prototype_text_chunk_size: 128
  retrieval_scorer: exact
