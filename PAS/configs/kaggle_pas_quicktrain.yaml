experiment:
  name: kaggle_pas_quicktrain
  output_dir: runs
  seed: 11
  local_rank: 0

model:
  name: PAS
  variant: pas_kaggle_quicktrain
  pretrain_choice: ViT-B/16
  image_backbone: clip_visual
  text_backbone: clip_text_transformer
  embedding_dim: 512
  projection_dim: 256
  projector_hidden_dim: 512
  projector_dropout: 0.0
  projector_type: mlp2
  backbone_precision: fp32
  prototype_precision: fp32
  temperature: 0.07
  learn_logit_scale: true
  img_size: [384, 128]
  stride_size: 16
  text_length: 77
  vocab_size: 49408
  use_prototype_bank: true
  use_image_conditioned_pooling: true
  use_prototype_contextualization: true
  return_debug_outputs: false

prototype:
  num_prototypes: 32
  prototype_dim: 512
  prototype_init: normalized_random
  prototype_init_path: null
  routing_type: dot
  routing_temperature: 0.07
  contextualization_enabled: true
  contextualization_type: self_attention
  contextualization_residual: true
  contextualization_num_layers: 1
  prototype_normalize: true
  assignment_sparse: false
  assignment_topk: 0
  use_diversity_loss: true
  diversity_loss_weight: 0.01
  use_balancing_loss: false
  balance_loss_weight: 0.0
  dead_prototype_threshold: 0.005

text_pooling:
  token_policy: content_only
  scoring_type: dot
  token_temperature: 0.07
  special_token_ids:
    bos_token_id: 49406
    eos_token_id: 49407
    pad_token_id: 0
  error_on_empty_kept_tokens: true

training:
  batch_size: 4
  epochs: 100
  log_period: 50
  eval_frequency: 1
  save_interval: 1
  resume: false
  resume_ckpt_file: ''
  finetune: ''
  pretrain: ''
  img_aug: false
  txt_aug: false
  sampler: identity
  num_instance: 2
  num_workers: 4
  training: true
  freeze_image_backbone: false
  freeze_text_backbone: false
  grad_clip: 1.0
  amp: false
  amp_dtype: fp16

optimizer:
  type: AdamW
  lr: 0.001
  lr_prototype_bank: 0.001
  lr_projectors: 0.001
  lr_logit_scale: 0.0001
  lr_image_backbone: 0.00002
  lr_text_backbone: 0.00001
  weight_decay: 0.01
  weight_decay_prototype_bank: 0.01
  weight_decay_projectors: 0.05
  weight_decay_logit_scale: 0.0
  weight_decay_image_backbone: 0.01
  weight_decay_text_backbone: 0.01
  momentum: 0.9
  alpha: 0.9
  beta: 0.999
  milestones: [2]
  gamma: 0.1
  warmup_factor: 0.1
  warmup_epochs: 5
  warmup_method: linear
  scheduler: cosine
  target_lr: 0.0
  power: 0.9

dataset:
  dataset_name: RSTPReid
  root_dir: data
  val_dataset: test
  num_workers: 4

logging:
  use_wandb: true
  project: PAS
  entity: null
  run_name: null
  group: kaggle_quicktrain
  mode: online
  tags: [pas, kaggle, quicktrain]
  notes: Lightweight PAS training config for Kaggle P100 or T4x2 sanity training with canonical v1 method defaults.
  log_interval: 50
  log_code: false
  log_debug_metrics: true

evaluation:
  checkpoint_path: ''
  device: cuda
  cross_domain_generalization: false
  target_domain: RSTPReid
  retrieval_metrics: [R1, R5, R10, mAP, mINP, rSum]
  batch_size: 64
  prototype_image_chunk_size: 8
  prototype_text_chunk_size: 16

