# Canonical single config file.
# Decision policy:
# - Keep: ITSELF hyperparameters from adapter/WACV2026-Oral-ITSELF/utils/options.py
# - Keep: shared training-process/runtime controls from this repo (optimizer scheduler logging eval process)
# - Remove from active use: legacy training_mode/stage routing and split loss section

experiment:
  name: ITSELF
  output_dir: run_logs
  seed: 1
  local_rank: 0

model:
  name: ITSELF
  variant: itself_base
  # Prototype is structure-only; retrieval is host-only.
  prototype_method_role: semantic_structure
  prototype_semantic_enabled: false
  prototype_recompute_enabled: false
  pretrain_choice: ViT-B/16
  image_backbone: clip_visual
  text_backbone: clip_text_transformer
  embedding_dim: 512
  projection_dim: 256
  projector_hidden_dim: 512
  projector_dropout: 0.0
  projector_type: mlp2
  normalize_projector_outputs: true
  use_custom_projector: true
  temperature: 0.02
  img_size: [384, 128]
  stride_size: 16
  text_length: 77
  vocab_size: 49408
  use_prototype_branch: false
  use_prototype_bank: false
  use_image_conditioned_pooling: false
  return_debug_outputs: false
  runtime_mode: auto

host:
  type: itself
  freeze_projectors: false
  itself_loss_names: tal+cid
  itself_only_global: false
  itself_select_ratio: 0.4
  itself_grab_embed_dim: 4096
  itself_score_weight_global: 0.32
  itself_tau: 0.015
  itself_margin: 0.1
  itself_return_all: false
  itself_topk_type: mean
  itself_layer_index: -1
  itself_average_attn_weights: true
  itself_modify_k: false
  itself_lambda1_weight: 0.5
  itself_lambda2_weight: 3.5

prototype:
  num_prototypes: 0
  prototype_dim: 512
  prototype_init: kmeans_centroids
  prototype_init_path:
  prototype_init_hybrid_ratio: 0.5
  prototype_init_max_iters: 50
  prototype_init_tol: 1.0e-4
  prototype_init_seed:
  routing_type: cosine
  routing_temperature: 0.07
  routing_source: global
  local_routing_temperature: 0.07
  local_routing_pooling: logsumexp
  local_routing_use_adapter: true
  local_routing_adapter_dim:
  local_routing_normalize_inputs: true
  contextualization_enabled: false
  contextualization_type: none
  contextualization_residual: false
  bank_source: learnable_legacy
  use_base_for_semantic_targets: true
  normalize_for_self_interaction: true
  normalize_for_routing: true
  dead_prototype_threshold: 0.005

semantic_structure:
  enabled: false
  feature_space: prototype_projected
  pbt_enabled: true
  soft_target_enabled: true
  target_temperature: 0.01
  pred_temperature: 0.07
  recompute_schedule: epoch
  recompute_interval: 1
  min_cluster_count_for_pbt: 1.0
  empty_cluster_policy: skip
  text_teacher_source: exact_diagonal
  text_student_source: surrogate_diagonal
  image_student_source: image_semantic_feature
  recompute_start_epoch: 0
  recompute_start_step: 0
  loss_ramp_start_epoch: 0
  loss_ramp_start_step: 0
  loss_ramp_epochs: 0
  loss_ramp_steps: 0
  ramp_loss_diag: false
  ramp_loss_semantic_pbt: true
  ramp_loss_semantic_hardneg_margin: true
  ramp_loss_semantic_hosthard_weighted: true
  ramp_use_prototype: false

lr_ablation:
  enabled: false
  base_lrs: [5.0e-6, 1.0e-5, 2.0e-5]
  num_epochs: 2
  selection_metric: val_r1
  selection_task: best-row-t2i
  save_each_run: true
  restore_initial_state_each_run: true
  write_summary_json: true
  summary_path: outputs/lr_ablation_summary.json

