# Direction 3 / Stage 1.5 / Option B
# Prototype utilization adaptation with low-lr bank updates and frozen host backbone.

experiment:
  name: DIRECTION3_STAGE15_OPTIONB_LOWLR_BANK

model:
  variant: direction3_stage15_prototype_utilization_optionB_lowlr_bank
  training_mode: pas
  use_prototype_branch: true
  use_prototype_bank: true
  use_image_conditioned_pooling: true

host:
  type: itself

prototype:
  num_prototypes: 32
  contextualization_enabled: true
  contextualization_type: self_attention

fusion:
  enabled: true
  coefficient: 1.0

training:
  epochs: 10
  finetune: ''
  freeze_prototype_side: false
  freeze_schedule:
    # Stage 1.5: host backbone frozen, bank still trainable at very low lr, train lightweight modules.
    - name: stage15_lowlr_bank
      epoch_start: 1
      epoch_end: 10
      trainable_groups: [prototype_bank, prototype_projector, routing, fusion]
      frozen_groups: [host_backbone, host_retrieval]
      lr_overrides:
        prototype_bank: 2.0e-6
        prototype_projector: 2.0e-5
        routing: 5.0e-6
        fusion: 2.0e-5
      loss_weights:
        lambda_host: 0.1
        lambda_ret: 0.5
        lambda_diag: 0.5
        lambda_bal: 0.005
        lambda_div: 0.005

optimizer:
  type: AdamW
  lr: 1.0e-5

logging:
  use_wandb: true
  project: direction3_stage15_prototype_utilization_optionB_lowlr_bank
