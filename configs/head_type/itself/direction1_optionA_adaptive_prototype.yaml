# Direction 1 / Option A (adaptive prototype)
# Warm-up prototype branch, then joint training with reduced prototype lr.

experiment:
  name: DIRECTION1_OPTIONA_ADAPTIVE

model:
  variant: direction1_optionA_adaptive_prototype_itself_head
  training_mode: pas
  use_prototype_branch: true
  use_prototype_bank: true
  use_image_conditioned_pooling: true

host:
  type: itself

prototype:
  num_prototypes: 32
  contextualization_enabled: true
  contextualization_type: self_attention

fusion:
  enabled: true
  coefficient: 1.0

training:
  epochs: 60
  log_period: 50
  freeze_prototype_side: false
  freeze_schedule:
    # Warm-up: freeze host backbone/retrieval, train prototype side only, lambda_host=0.
    - name: warmup
      epoch_start: 1
      epoch_end: 5
      trainable_groups: [prototype_bank, prototype_projector, routing, fusion]
      frozen_groups: [host_backbone, host_retrieval]
      lr_overrides:
        prototype_bank: 5.0e-5
        prototype_projector: 5.0e-5
        routing: 5.0e-5
        fusion: 5.0e-5
      loss_weights:
        lambda_host: 0.0
        lambda_ret: 1.0
        lambda_diag: 1.0
        lambda_bal: 0.01
        lambda_div: 0.01
    # Joint: unfreeze host and keep prototype adaptive with lower lr.
    - name: joint_adaptive
      epoch_start: 6
      epoch_end: 60
      trainable_groups: [host_backbone, host_retrieval, prototype_bank, prototype_projector, routing, fusion]
      frozen_groups: []
      lr_overrides:
        host_backbone: 5.0e-6
        host_retrieval: 1.0e-5
        prototype_bank: 1.0e-5
        prototype_projector: 2.0e-5
        routing: 1.0e-5
        fusion: 2.0e-5
      loss_weights:
        lambda_host: 1.0
        lambda_ret: 0.5
        lambda_diag: 0.5
        lambda_bal: 0.005
        lambda_div: 0.005

optimizer:
  type: AdamW
  lr: 1.0e-5
  lr_image_backbone: 5.0e-6
  lr_text_backbone: 5.0e-6

logging:
  use_wandb: true
  project: direction1_optionA_adaptive_prototype_itself_head


