# Direction 3 / Stage 2 / Option A (recommended)
# Backbone transfer with frozen prototype bank/routing.

experiment:
  name: DIRECTION3_STAGE2_OPTIONA_FROZEN_TRANSFER

model:
  variant: direction3_stage2_optionA_frozen_transfer
  training_mode: pas
  use_prototype_branch: true
  use_prototype_bank: true
  use_image_conditioned_pooling: true

host:
  type: itself

prototype:
  num_prototypes: 32
  contextualization_enabled: true
  contextualization_type: self_attention

fusion:
  enabled: true
  coefficient: 1.0

training:
  epochs: 35
  finetune: ''
  freeze_prototype_side: false
  freeze_schedule:
    # Stage 2: host unfrozen with full host loss; prototype bank/routing fixed.
    - name: stage2_frozen_transfer
      epoch_start: 1
      epoch_end: 35
      trainable_groups: [host_backbone, host_retrieval, prototype_projector, fusion]
      frozen_groups: [prototype_bank, routing]
      lr_overrides:
        host_backbone: 1.0e-5
        host_retrieval: 1.0e-5
        prototype_projector: 2.0e-5
        fusion: 2.0e-5
      loss_weights:
        lambda_host: 1.0
        lambda_ret: 0.25
        lambda_diag: 0.25
        lambda_bal: 0.002
        lambda_div: 0.002

optimizer:
  type: AdamW
  lr: 1.0e-5
