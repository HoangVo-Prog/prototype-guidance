# End-to-end recipe: Direction 1 / Option A (adaptive prototype).
# Phase chain:
# 1) Prototype warm-up
# 2) Joint host+prototype training with reduced prototype lr

experiment:
  name: RECIPE_DIRECTION1_OPTIONA

model:
  variant: recipe_direction1_optionA
  training_mode: pas
  use_prototype_branch: true
  use_prototype_bank: true
  use_image_conditioned_pooling: true

host:
  type: itself

prototype:
  num_prototypes: 32
  contextualization_enabled: true
  contextualization_type: self_attention

fusion:
  enabled: true
  coefficient: 1.0

training:
  log_debug_metrics: true
  epochs: 60
  log_period: 50
  prototype_selection_metric: R1
  freeze_schedule:
    - name: warmup
      epoch_start: 1
      epoch_end: 5
      trainable_groups: [prototype_bank, prototype_projector, routing, fusion]
      frozen_groups: [host_backbone, host_retrieval]
      lr_overrides:
        prototype_bank: 5.0e-5
        prototype_projector: 5.0e-5
        routing: 5.0e-5
        fusion: 5.0e-5
      loss_weights:
        lambda_host: 0.0
        lambda_ret: 1.0
        lambda_diag: 1.0
        lambda_bal: 0.01
        lambda_div: 0.01
    - name: joint_adaptive
      epoch_start: 6
      epoch_end: 60
      trainable_groups: [host_backbone, host_retrieval, prototype_bank, prototype_projector, routing, fusion]
      frozen_groups: []
      lr_overrides:
        host_backbone: 1.0e-5
        host_retrieval: 1.0e-5
        prototype_bank: 1.0e-5
        prototype_projector: 2.0e-5
        routing: 1.0e-5
        fusion: 2.0e-5
      loss_weights:
        lambda_host: 1.0
        lambda_ret: 0.5
        lambda_diag: 0.5
        lambda_bal: 0.005
        lambda_div: 0.005

optimizer:
  type: AdamW
  lr: 1.0e-5

logging:
  use_wandb: true
  project: recipe_direction1_optionA

