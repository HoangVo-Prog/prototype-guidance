train_mode: itself

prototype:
  enabled: true
  num_prototypes: 64
  dim: 8
  contextualization:
    enabled: true
    type: self_attention
  temperatures:
    routing: 0.07
    basis: 0.07
    teacher: 0.07
    retrieval: 0.07
  regularization:
    diversity:
      enabled: true
      weight: 1.0
    balance:
      enabled: true
      weight: 1.0

fusion:
  enabled: true
  lambda_f: 0.1

host:
  lambda_s: 0.5

training:
  stage: stage2
  calibration_only: false
  freeze:
    host: false
    prototype: false
    host_allowlist: []
    prototype_policy: train_all
  initialization:
    clip_backbone_source: openai:ViT-B/16
    stage1_prototype_checkpoint: null
    host_checkpoint: null
    host_checkpoint_compatible: false

loss:
  host_enabled: true
  prototype_ret_enabled: true
  prototype_diag_enabled: true
  prototype_div_enabled: true
  prototype_bal_enabled: true

runtime:
  host_runtime: synthetic
  steps: 1
  batch:
    batch_size: 4
    seq_len: 6
  synthetic:
    feature_dim: 8
  optimizer:
    host_lr: 0.0001
    prototype_lr: 0.0001
  output:
    log_dir: outputs/stage2_itself/logs
    checkpoint_dir: outputs/stage2_itself/checkpoints

