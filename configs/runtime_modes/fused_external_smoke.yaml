experiment:
  name: runtime_fused_external_smoke
  output_dir: runs
  seed: 1

model:
  runtime_mode: fused_external
  use_prototype_branch: true
  use_prototype_bank: true
  use_image_conditioned_pooling: true
  return_debug_outputs: false

host:
  type: clip

prototype:
  num_prototypes: 32
  prototype_dim: 512
  prototype_init: normalized_random
  routing_type: cosine
  routing_temperature: 0.07
  routing_source: global
  local_routing_pooling: logsumexp
  contextualization_enabled: true
  contextualization_type: self_attention
  contextualization_residual: true

fusion:
  enabled: true
  lambda_host: 0.8
  lambda_prototype: 0.2
  coefficient_source: fixed
  composer_calibration_enabled: true
  eval_subsets:
    - { name: "host_only", lambda_host: 1.0, lambda_prototype: 0.0 }
    - { name: "proto_only", lambda_host: 0.0, lambda_prototype: 1.0 }
    - { name: "fused_020", lambda_host: 0.8, lambda_prototype: 0.2 }

objectives:
  objectives:
    use_host_loss: true
    use_loss_ret: true
    retrieval_mode: surrogate_i2t
  lambda:
    host: 1.0
    ret: 1.0

text_pooling:
  token_policy: content_only

training:
  batch_size: 8
  epochs: 1
  eval_frequency: 1
  save_interval: 1
  training: true
  amp: false

optimizer:
  type: AdamW
  lr: 1.0e-5
  lr_prototype_bank: 1.0e-5
  lr_projectors: 1.0e-5
  lr_prototype_routing: 1.0e-5
  lr_prototype_pooling: 1.0e-5

dataset:
  dataset_name: CUHK-PEDES
  root_dir: data
  val_dataset: test

logging:
  use_wandb: false
  log_debug_metrics: true

evaluation:
  retrieval_scorer: exact
  batch_size: 128
  prototype_image_chunk_size: 16
  prototype_text_chunk_size: 64

checkpointing:
  metric:
    name: R1
    mode: max
  groups:
    host:
      enabled: false
    prototype_bank:
      enabled: false
    prototype_projector:
      enabled: false
    fusion:
      enabled: true
  authority_validation:
    enabled: true
    strict: true
    warn_only: false
    allow_fallback_row_name_classification: true

