experiment:
  name: runtime_host_only_realistic
  output_dir: runs
  seed: 1

model:
  name: CLIP
  variant: clip_original
  pretrain_choice: ViT-B/16
  image_backbone: clip_visual
  text_backbone: clip_text_transformer
  embedding_dim: 512
  projection_dim: 256
  projector_hidden_dim: 512
  projector_dropout: 0.0
  projector_type: mlp2
  normalize_projector_outputs: true
  use_custom_projector: true
  temperature: 0.07
  img_size: [384, 128]
  stride_size: 16
  text_length: 77
  vocab_size: 49408
  use_prototype_branch: false
  use_prototype_bank: false
  use_image_conditioned_pooling: false
  return_debug_outputs: false

host:
  type: clip

objectives:
  objectives:
    use_host_loss: true
    use_loss_diag: false
    use_loss_semantic_pbt: false
    retrieval_mode: clip_bidirectional
    use_balancing_loss: false
    use_diversity_loss: false
  lambda:
    host: 1.0

    diag: 0.0
    semantic_pbt: 0.0
    balance: 0.0
    diversity: 0.0

text_pooling:
  token_policy: eos_only
  scoring_type: cosine
  normalize_for_token_scoring: true
  token_temperature: 0.07
  special_token_ids:
    bos_token_id: 49406
    eos_token_id: 49407
    pad_token_id: 0
  error_on_empty_kept_tokens: true

training:
  batch_size: 256
  epochs: 15
  log_period: 50
  eval_frequency: 1
  save_interval: 1
  resume: false
  resume_ckpt_file: ''
  pretrain: ''
  img_aug: true
  txt_aug: true
  sampler: identity
  num_instance: 2
  num_workers: 4
  training: true
  freeze_image_backbone: false
  freeze_text_backbone: false
  freeze_prototype_side: true
  freeze_host_projectors: false
  grad_clip: 0.0
  proxy_temperature: 0.07
  diag_temperature: 0.07  

optimizer:
  type: Adam
  lr: 1.0e-5
  lr_prototype_bank: 0.0
  lr_projectors: 0.0
  lr_prototype_routing: 0.0
  lr_prototype_pooling: 0.0
  lr_prototype_contextualization: 0.0
  lr_host_projectors: 1.0e-5
  lr_image_backbone: 1.0e-5
  lr_text_backbone: 1.0e-5
  weight_decay: 4.0e-5
  weight_decay_prototype_bank: 0.0
  weight_decay_projectors: 0.0
  weight_decay_prototype_routing: 0.0
  weight_decay_prototype_pooling: 0.0
  weight_decay_prototype_contextualization: 0.0
  weight_decay_host_projectors: 4.0e-5
  lr_class_proxies: 0.0
  weight_decay_class_proxies: 0.0
  weight_decay_image_backbone: 4.0e-5
  weight_decay_text_backbone: 4.0e-5

  momentum: 0.9
  alpha: 0.9
  beta: 0.999
  lr_factor: 5.0
  bias_lr_factor: 2.0
  weight_decay_bias: 0.0
  optimizer_eps: 1.0e-3
  milestones: [45, 50]
  gamma: 0.1
  warmup_factor: 0.1
  warmup_epochs: 5
  warmup_method: linear
  scheduler: cosine
  target_lr: 0.0
  power: 0.9

dataset:
  dataset_name: RSTPReid
  root_dir: data
  val_dataset: test
  num_workers: 4

logging:
  use_wandb: true
  project: clip_original
  entity:
  run_name:
  group: clip_base
  mode: online
  tags: [clip, origianal]
  notes: 
  log_interval: 50
  log_code: false
  log_debug_metrics: false

evaluation:
  checkpoint_path: ''
  device: cuda
  cross_domain_generalization: false
  target_domain: CUHK-PEDES
  retrieval_metrics: [R1, R5, R10, mAP, mINP, rSum]
  batch_size: 512
  prototype_image_chunk_size: 32
  prototype_text_chunk_size: 128

checkpointing:
  metric:
    name: R1
    mode: max
  groups:
    host:
      enabled: true
    prototype_bank:
      enabled: false
    prototype_projector:
      enabled: false
  save:
    save_latest: true
    save_best: true
    keep_last_n: 1
  authority_validation:
    enabled: true
    strict: true
    warn_only: false
    allow_fallback_row_name_classification: true
