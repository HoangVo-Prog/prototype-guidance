experiment:
  name: runtime_host_only_realistic
  output_dir: runs
  seed: 1

model:
  runtime_mode: host_only
  variant: runtime_clip_only_realistic
  temperature: 0.07
  use_custom_projector: false
  use_prototype_branch: false
  use_prototype_bank: false
  use_image_conditioned_pooling: false
  return_debug_outputs: false

host:
  type: clip

fusion:
  enabled: false

objectives:
  objectives:
    use_host_loss: true
    use_loss_proxy_image: false
    use_loss_proxy_text: false
    use_loss_proxy_text_exact: false
    use_loss_align: false
    use_loss_diag: false
    use_loss_gap: false
    use_loss_support: false
    prototype_gap_margin: 0.05
    prototype_support_target: 4.0
    use_loss_ret: false
    use_loss_weight_ret: false
    retrieval_mode: clip_bidirectional
    use_balancing_loss: false
    use_diversity_loss: false
  lambda:
    host: 1.0
    proxy: 0.0
    proxy_image: 0.0
    proxy_text: 0.0
    proxy_text_exact: 0.0
    align: 0.0
    diag: 0.0
    gap: 0.0
    support: 0.0
    ret: 0.0
    weight_ret: 0.0
    balance: 0.0
    diversity: 0.0

text_pooling:
  token_policy: eos_only
  special_token_ids:
    bos_token_id: 49406
    eos_token_id: 49407
    pad_token_id: 0

training:
  batch_size: 128
  epochs: 15
  eval_frequency: 1
  save_interval: 1
  training: true
  freeze_host_backbone: false
  freeze_host_retrieval: false
  freeze_fusion: true
  freeze_prototype_bank: true
  freeze_prototype_projector: true
  freeze_routing: true
  freeze_image_backbone: false
  freeze_text_backbone: false
  grad_clip: 0.0
  amp: false

optimizer:
  type: Adam
  lr: 1.0e-5
  lr_host_projectors: 1.0e-5
  lr_image_backbone: 1.0e-5
  lr_text_backbone: 1.0e-5
  weight_decay: 4.0e-5
  weight_decay_host_projectors: 4.0e-5
  weight_decay_image_backbone: 4.0e-5
  weight_decay_text_backbone: 4.0e-5
  optimizer_eps: 1.0e-3

dataset:
  dataset_name: RSTPReid
  root_dir: data
  val_dataset: test

logging:
  use_wandb: true
  project: clip_host_only
  entity:
  run_name:
  group: clip_base
  mode: online
  tags: [clip, host_only]
  notes: 
  log_interval: 50
  log_code: false
  log_debug_metrics: false

evaluation:
  retrieval_scorer: exact
  batch_size: 512

checkpointing:
  metric:
    name: R1
    mode: max
  groups:
    host:
      enabled: true
    prototype_bank:
      enabled: false
    prototype_projector:
      enabled: false
    fusion:
      enabled: false
  save:
    save_latest: true
    save_best: true
    keep_last_n: 2
  authority_validation:
    enabled: true
    strict: true
    warn_only: false
    allow_fallback_row_name_classification: true
