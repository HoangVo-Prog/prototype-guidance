experiment:
  name: stage3_itself_fusion_calibration
  output_dir: runs
  seed: 11
  local_rank: 0

model:
  name: PAS
  variant: stage3_itself_fusion_calibration
  training_mode: pas
  pretrain_choice: ViT-B/16
  image_backbone: clip_visual
  text_backbone: clip_text_transformer
  embedding_dim: 512
  projection_dim: 256
  projector_hidden_dim: 512
  projector_dropout: 0.0
  projector_type: mlp2
  normalize_projector_outputs: true
  use_custom_projector: true
  backbone_precision: fp32
  prototype_precision: fp32
  temperature: 0.07
  img_size: [384, 128]
  stride_size: 16
  text_length: 77
  vocab_size: 49408
  use_prototype_branch: true
  use_prototype_bank: true
  use_image_conditioned_pooling: true
  return_debug_outputs: true

itself_reference:
  enabled: true
  path: ../itself_dataset_reference.yaml

host:
  type: itself
  enabled: true
  loss_weight: 1.0
  freeze_projectors: true
  itself_loss_names: tal+cid
  itself_only_global: false
  itself_select_ratio: 0.4
  itself_grab_embed_dim: 4096
  itself_score_weight_global: 0.68
  itself_tau: 0.015
  itself_margin: 0.1
  itself_return_all: true
  itself_topk_type: mean
  itself_layer_index: -1
  itself_average_attn_weights: true
  itself_modify_k: false

prototype:
  num_prototypes: 32
  prototype_dim: 512
  prototype_init: kmeans_centroids
  prototype_init_path: null
  prototype_init_hybrid_ratio: 0.5
  prototype_init_max_iters: 50
  prototype_init_tol: 1.0e-4
  prototype_init_seed: null
  routing_type: cosine
  routing_temperature: 0.07
  contextualization_enabled: true
  contextualization_type: self_attention
  contextualization_residual: true
  normalize_for_self_interaction: true
  normalize_for_routing: true
  dead_prototype_threshold: 0.005

fusion:
  enabled: true
  coefficient: 1.0
  coefficient_source: validation_tuned

objectives:
  use_host_loss: true
  lambda_host: 1.0
  use_proto_loss_ret: true
  lambda_proto_ret: 1.0
  use_diag_fidelity: true
  lambda_diag: 1.0
  use_diversity: true
  lambda_diversity: 0.01
  use_balance: true
  lambda_balance: 0.01

loss:
  use_diversity_loss: true
  diversity_loss_weight: 0.01
  use_balancing_loss: true
  balance_loss_weight: 0.01
  use_loss_proxy_image: false
  use_loss_proxy_text: false
  use_loss_proxy_text_exact: false
  lambda_proxy_image: 0.0
  lambda_proxy_text: 0.0
  lambda_proxy_text_exact: 0.0
  use_loss_align: false
  lambda_align: 0.0
  use_loss_diag: true
  lambda_diag: 1.0
  use_loss_ret: true
  retrieval_mode: surrogate_i2t
  lambda_ret: 1.0
  use_loss_support: false
  lambda_support: 0.0
  support_min: 2.0

text_pooling:
  token_policy: content_only
  scoring_type: cosine
  normalize_for_token_scoring: true
  token_temperature: 0.07
  special_token_ids:
    bos_token_id: 49406
    eos_token_id: 49407
    pad_token_id: 0
  error_on_empty_kept_tokens: true

training:
  batch_size: 64
  epochs: 1
  log_period: 20
  eval_frequency: 1
  save_interval: 1
  resume: false
  resume_ckpt_file: ''
  finetune: path/to/stage2_itself_plus_proto_best.pth
  pretrain: ''
  img_aug: false
  txt_aug: false
  sampler: random
  num_instance: 2
  num_workers: 4
  training: false
  stage: stage3
  freeze_image_backbone: true
  freeze_text_backbone: true
  freeze_prototype_side: true
  freeze_host_projectors: true
  grad_clip: 1.0
  amp: false
  amp_dtype: fp16
  proxy_temperature: 0.07

optimizer:
  type: AdamW
  lr: 0.0
  lr_prototype_bank: 0.0
  lr_projectors: 0.0
  lr_prototype_routing: 0.0
  lr_prototype_pooling: 0.0
  lr_prototype_contextualization: 0.0
  lr_host_projectors: 0.0
  lr_image_backbone: 0.0
  lr_text_backbone: 0.0
  weight_decay: 0.0
  weight_decay_prototype_bank: 0.0
  weight_decay_projectors: 0.0
  weight_decay_prototype_routing: 0.0
  weight_decay_prototype_pooling: 0.0
  weight_decay_prototype_contextualization: 0.0
  weight_decay_host_projectors: 0.0
  lr_class_proxies: 0.0
  weight_decay_class_proxies: 0.0
  weight_decay_image_backbone: 0.0
  weight_decay_text_backbone: 0.0
  momentum: 0.9
  alpha: 0.9
  beta: 0.999
  milestones: [1]
  gamma: 0.1
  warmup_factor: 0.1
  warmup_epochs: 0
  warmup_method: linear
  scheduler: cosine
  target_lr: 0.0
  power: 0.9

dataset:
  dataset_name: RSTPReid
  root_dir: data
  val_dataset: val
  num_workers: 4

logging:
  use_wandb: false
  project: PAS-Stage3
  entity: null
  run_name: null
  group: stage3_itself_fusion_calibration
  mode: online
  tags: [pas, itself, stage3, fusion]
  notes: Stage 3 requires the trained Stage 2 ITSELF+prototype checkpoint in both training.finetune and evaluation.checkpoint_path, then calibrates fusion on val.
  log_interval: 50
  log_code: false
  log_debug_metrics: true

evaluation:
  checkpoint_path: path/to/stage2_itself_plus_proto_best.pth
  device: cuda
  cross_domain_generalization: false
  target_domain: RSTPReid
  retrieval_metrics: [R1, R5, R10, mAP, mINP, rSum]
  batch_size: 512
  prototype_image_chunk_size: 8
  prototype_text_chunk_size: 16
  retrieval_scorer: exact
